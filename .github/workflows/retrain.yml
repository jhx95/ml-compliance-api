name: Auto Retrain Model

on:
  schedule:
    - cron: '0 2 * * 0'  # Каждое воскресенье в 2:00
  workflow_dispatch:      # Можно запустить вручную

jobs:
  retrain:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy scikit-learn xgboost joblib mlflow
    
    - name: Run retraining
      run: python retrain.py
    
    - name: Commit new model if better
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add models/compliance_model.joblib
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-retrain: new model version"
        git push